apiVersion: batch/v1
kind: Job
metadata:
  name: quantum-wave-job
  namespace: default
  labels:
    app: quantum-worker
    phase: d2
spec:
  completions: 10
  parallelism: 5
  completionMode: Indexed
  backoffLimit: 3

  template:
    metadata:
      labels:
        app: quantum-worker
        metrics: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      restartPolicy: OnFailure

      initContainers:
        # ── Native Sidecar (K8s 1.29+): runs alongside main container ───────
        # restartPolicy: Always = Kubernetes treats this as a sidecar,
        # does NOT wait for it to exit before marking the pod Complete
        - name: node-exporter
          image: prom/node-exporter:v1.7.0
          restartPolicy: Always        # ← THIS is what makes it a native sidecar
          ports:
            - name: metrics
              containerPort: 9100
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"

        # ── Redis readiness gate ─────────────────────────────────────────────
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z ${REDIS_HOST} ${REDIS_PORT}; do
                echo "Redis not ready - retrying in 3s..."
                sleep 3
              done
              echo "Redis reachable."
          env:
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: quantum-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: quantum-config
                  key: REDIS_PORT

      containers:
        # ── Main worker: exits when done, triggering pod Completion ──────────
        - name: worker
          image: 130618649351.dkr.ecr.us-west-2.amazonaws.com/quantum-compute-lab/worker:latest
          imagePullPolicy: Always
          command: ["python", "parallel_worker.py"]
          env:
            - name: JOB_COMPLETION_INDEX
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index']
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: quantum-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: quantum-config
                  key: REDIS_PORT
            - name: GRID_SIZE
              valueFrom:
                configMapKeyRef:
                  name: quantum-config
                  key: GRID_SIZE
            - name: TOTAL_JOBS
              value: "10"
          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: scratch
              mountPath: /mnt/results

      volumes:
        - name: scratch
          emptyDir: {}
