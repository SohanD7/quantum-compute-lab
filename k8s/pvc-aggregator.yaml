apiVersion: apps/v1
kind: Deployment
metadata:
  name: result-aggregator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: result-aggregator
  template:
    metadata:
      labels:
        app: result-aggregator
    spec:
      containers:
        - name: aggregator
          image: busybox:1.36
          command: ["sh", "-c", "echo 'PVC mounted at /mnt/results' && ls /mnt/results && sleep 3600"]
          volumeMounts:
            - name: results-storage
              mountPath: /mnt/results
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
      volumes:
        - name: results-storage
          persistentVolumeClaim:
            claimName: quantum-results-pvc
