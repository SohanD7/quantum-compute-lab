apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:

      # Prometheus scrapes itself
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # ── Kubernetes Pod Service Discovery ──────────────────────────────────
      # Automatically finds all pods annotated with prometheus.io/scrape=true
      # This scrapes the node-exporter sidecar on port 9100 in each worker pod
      - job_name: 'quantum-worker-metrics'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [default]
        relabel_configs:
          # Only scrape pods with annotation prometheus.io/scrape=true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          # Build __address__ from pod IP + annotation port
          - source_labels: [__meta_kubernetes_pod_ip,
                            __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: (.+);(.+)
            replacement: $1:$2
          # Preserve useful labels on every metric
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
